<!doctype html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="./images/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VAMRSS</title>
  <meta name="description" content="VAMRSS official portfolio and works database.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    :root {
      --bg: #f8f9f9;
      --ink: #111714;
      --sub: #68736f;
      --muted: #9aa5a1;
      --invert-bg: #111714;
      --invert-ink: #f8f9f9;
      --danger: #9b3144;
      --font-main: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    }

    html[data-theme="dark"] {
      --bg: #101312;
      --ink: #edf1ef;
      --sub: #a4aeaa;
      --muted: #707b77;
      --invert-bg: #edf1ef;
      --invert-ink: #101312;
      --danger: #e28a9a;
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: var(--font-main);
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.01em;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: calc(max(18px, env(safe-area-inset-top)) + 24px) 20px max(36px, env(safe-area-inset-bottom));
      position: relative;
    }


    .fixed-version-mark {
      position: absolute;
      right: 20px;
      bottom: max(36px, env(safe-area-inset-bottom));
      z-index: 20;
      color: var(--muted);
      font-size: 12px;
      font-weight: 300;
      line-height: 1;
      pointer-events: none;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      grid-template-areas: "logo nav";
      align-items: start;
      column-gap: 18px;
      row-gap: 0;
      margin-bottom: 48px;
    }

    .site-title {
      grid-area: logo;
      margin: 0;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.11em;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      text-align: left;
    }


    .site-title {
      grid-area: logo;
      justify-self: start;
      align-self: start;
      text-align: left;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 6px;
      width: 100%;
      padding: 0;
      margin: 0;
      line-height: 1;
    }

    .site-logo {
      appearance: none;
      border: 0;
      background: transparent;
      display: block;
      width: 145px;
      max-width: 38vw;
      margin: 0;
      padding: 0;
      line-height: 0;
      text-align: left;
      flex: 0 0 auto;
      transform: translateX(0);
      cursor: pointer;
    }

    .site-logo-img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 32px;
      margin: 0;
      padding: 0;
      object-fit: contain;
      object-position: left center;
    }

    .site-logo:focus {
      outline: none;
    }

    html[data-theme="dark"] .site-logo-img {
      filter: invert(1);
    }

    .screen-label {
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .version-mark {
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    .text-nav {
      grid-area: nav;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: flex-end;
      flex-wrap: nowrap;
      text-align: right;
      align-self: start;
      justify-self: end;
      padding: 0;
      margin: 0;
      line-height: 1;
      white-space: nowrap;
    }

    .text-button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0 2px;
      color: var(--sub);
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
    }


    .inline-search-wrap.open {
      display: block;
    }

    .inline-search-wrap #searchInput {
      width: 100%;
      min-width: 0;
      min-height: 24px;
      border: 0;
      border-radius: 0;
      background: var(--ink);
      color: var(--bg);
      padding: 2px 8px;
      outline: none;
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
      text-align: left;
    }

    .inline-search-wrap #searchInput::placeholder {
      color: var(--bg);
      opacity: 0.88;
    }

    .theme-symbol {
      font-family: var(--font-main);
      font-size: 12px;
      line-height: 2;
      letter-spacing: 0;
      text-transform: none;
    }

    .topbar .text-nav .text-button {
      line-height: 1;
      padding-top: 0;
    }

    .text-button:hover,
    .text-button.active {
      color: var(--ink);
    }

    .text-button.selected {
      color: var(--ink);
    }

    .text-button.selected::before {
      content: "[";
    }

    .text-button.selected::after {
      content: "]";
    }

    #techniqueLinks .text-button.selected {
      color: var(--invert-ink);
      background: var(--invert-bg);
    }

    #techniqueLinks .text-button.selected::before,
    #techniqueLinks .text-button.selected::after {
      content: "";
    }

    .text-button.danger {
      color: var(--danger);
    }

    .text-button.danger:hover {
      color: var(--invert-ink);
      background: var(--danger);
    }


    .mode-switch .text-button::before,
    .bracket-switch .text-button::before {
      content: "[";
      color: var(--bg);
    }

    .mode-switch .text-button::after,
    .bracket-switch .text-button::after {
      content: "]";
      color: var(--bg);
    }

    .mode-switch .text-button.selected::before,
    .mode-switch .text-button.selected::after,
    .bracket-switch .text-button.selected::before,
    .bracket-switch .text-button.selected::after {
      content: "";
    }

    .mode-switch .text-button .mode-bracket {
      color: var(--bg);
    }

    .mode-switch .text-button.selected,
    .bracket-switch .text-button.selected {
      color: var(--ink);
    }

    .mode-switch .text-button.selected::before,
    .bracket-switch .text-button.selected::before {
      content: "[";
      color: var(--ink);
    }

    .mode-switch .text-button.selected::after,
    .bracket-switch .text-button.selected::after {
      content: "]";
      color: var(--ink);
    }

    #entryScreen .form input,
    #entryScreen .form textarea,
    #entryScreen .form select,
    #seriesEntryScreen .form input,
    #seriesEntryScreen .form textarea,
    #seriesEntryScreen .form select {
      border: 0;
      background: var(--ink);
      color: var(--bg);
      padding: 2px 8px;
    }

    #entryScreen .form input::placeholder,
    #entryScreen .form textarea::placeholder,
    #seriesEntryScreen .form input::placeholder,
    #seriesEntryScreen .form textarea::placeholder {
      color: var(--bg);
      opacity: 0.65;
    }

    #entryScreen .ask-line,
    #seriesEntryScreen .ask-line {
      color: var(--sub);
    }

    #entryScreen .ask-line input {
      background: transparent;
      padding: 0;
    }

    #entryScreen .form select,
    #seriesEntryScreen .form select {
      color-scheme: dark;
    }

    html[data-theme="dark"] #entryScreen .form select,
    html[data-theme="dark"] #seriesEntryScreen .form select {
      color-scheme: light;
    }

    .filter-area {
      display: grid;
      gap: 8px;
      margin-bottom: 11px;
    }

    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0 5px;
      min-width: 0;
    }

    .mode-switch,
    .bracket-switch {
      gap: 0 2px;
    }

    .collapsible {
      display: none;
      margin-top: 7px;
    }

    .collapsible.open {
      display: grid;
      gap: 7px;
      margin-bottom: 24px;
    }

    .search-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      margin-bottom: 14px;
    }

    .utility-line {
      grid-template-columns: auto minmax(0, 1fr) auto;
    }

    .utility-line button:first-child {
      grid-column: 1;
      justify-self: start;
    }

    .utility-line button:last-child {
      grid-column: 3;
      justify-self: end;
    }

    .inline-search-wrap {
      display: none;
      grid-column: 2;
      min-width: 0;
    }

    .inline-search-wrap.open {
      display: block;
    }

    #searchInput {
      width: 100%;
      min-width: 0;
      min-height: 24px;
      border: 0;
      border-radius: 0;
      background: var(--ink);
      color: var(--bg);
      padding: 2px 8px;
      outline: none;
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
      text-align: left;
    }

    #searchInput::placeholder {
      color: var(--bg);
      opacity: 0.88;
    }

    input, textarea, select {
      width: 100%;
      min-width: 0;
      min-height: 24px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      padding: 2px 0;
      outline: none;
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
    }

    .search-line input {
      border-bottom: 0;
    }

    .search-line input:focus {
      border-bottom: 0;
    }

    .form input,
    .form textarea,
    .form select,
    .data-block input,
    .data-block textarea,
    .data-block select {
      border-bottom: 1px solid var(--sub);
    }

    .form input:focus,
    .form textarea:focus,
    .form select:focus,
    .data-block input:focus,
    .data-block textarea:focus,
    .data-block select:focus {
      border-bottom-color: var(--ink);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    select {
      appearance: none;
    }

    .section-title {
      margin: 16px 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .list {
      display: grid;
      gap: 0;
    }

    .list-head,
    .work-summary {
      width: 100%;
      display: grid;
      grid-template-columns: 4.5em minmax(0, 1fr) 7.5em;
      gap: 1em;
      align-items: baseline;
      border: 0;
      background: transparent;
      padding: 1px 0;
      text-align: left;
    }


    .list-head .text-button.selected::before,
    .list-head .text-button.selected::after {
      content: "";
    }

    .list-head .text-button.selected {
      color: var(--ink);
      background: transparent;
    }

    .list-head button,
    .list-head button:last-child,
    .list-head .text-button:nth-child(1),
    .list-head .text-button:nth-child(2),
    .list-head .text-button:nth-child(3) {
      justify-self: stretch;
      text-align: left;
    }


    .sort-mark {
      display: inline-block;
      width: 1em;
      text-align: left;
      transform-origin: center;
    }

    .sort-mark.desc {
      transform: rotate(180deg);
    }

    .title-end-date {
      color: var(--sub);
      margin-left: 1em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #techniqueLinks .text-button {
      background: transparent;
    }

    #techniqueLinks .text-button.selected {
      background: transparent !important;
      color: var(--ink);
    }

    #techniqueLinks .text-button::before,
    #techniqueLinks .text-button::after {
      display: inline-block;
      width: 0.55em;
      text-align: center;
    }

    #techniqueLinks .text-button.selected::before {
      content: "[";
      color: var(--ink);
    }

    #techniqueLinks .text-button.selected::after {
      content: "]";
      color: var(--ink);
    }

    #techniqueLinks .text-button:not(.selected)::before {
      content: "[";
      color: var(--bg);
    }

    #techniqueLinks .text-button:not(.selected)::after {
      content: "]";
      color: var(--bg);
    }

    .list-head {
      color: var(--muted);
      margin-bottom: 4px;
    }

    .list-head button {
      text-align: left;
    }

    .list-head button:last-child {
      text-align: left;
    }

    .list-head .text-button {
      display: block;
      width: 100%;
      white-space: nowrap;
      min-width: 0;
      overflow: visible;
    }

    .list-head .text-button:nth-child(1),
    .list-head .text-button:nth-child(2) {
      justify-self: stretch;
      text-align: left;
    }

    .list-head .text-button:nth-child(3) {
      justify-self: stretch;
      text-align: left;
    }

    .work {
      margin: 0;
    }

    .work-no {
      color: var(--sub);
      text-align: left;
      font-variant-numeric: tabular-nums;
    }





    .work-title {
      position: relative;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .work-title .title-scroll {
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: top;
    }


    }

    }


    .work-year {
      display: block;
      width: 100%;
      color: var(--sub);
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .work-detail {
      display: none;
      margin-left: 1em;
      padding: 2px 0 9px 0;
      color: var(--sub);
      font-size: 12px;
      font-weight: 300;
      line-height: 2;
    }

    .inline-expanded {
      margin-left: 1em;
    }

    .work.open .work-detail {
      display: block;
    }

    .detail-grid {
      display: grid;
      gap: 1px;
      padding: 3px 0 6px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 10px;
      align-items: baseline;
    }

    .detail-key {
      color: var(--muted);
      text-align: left;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-value {
      color: var(--ink);
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .empty {
      padding: 14px 0;
      color: var(--sub);
      text-align: left;
    }


    }


    }


    .entry-layout {
      display: grid;
      gap: 10px;
    }

    .entry-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px 14px;
      min-width: 0;
    }

    .entry-row.cols-2 {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .entry-workno-technique {
      grid-template-columns: 100px 200px;
      justify-content: start;
    }

    .entry-dates {
      grid-template-columns: 130px 130px;
      justify-content: start;
    }

    .entry-price {
      grid-template-columns: 100px minmax(0, 1fr) auto;
      align-items: end;
    }

    .entry-exhibition {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    .entry-add-selected {
      align-self: end;
    }

    .inline-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .price-row .ask-line,
    .entry-price .ask-line {
      min-height: 24px;
      align-items: center;
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .entry-hidden {
      display: none;
    }

    .form input:not([type="checkbox"]),
    .form textarea {
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding-left: 0;
      padding-right: 0;
    }

    .form select,
    .form input[type="date"] {
      border: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding-left: 6px;
      padding-right: 6px;
    }

    .form input[type="date"] {
      text-align: left;
    }

    .form input:not([type="checkbox"]),
    .form textarea,
    .form select {
      background: var(--bg) !important;
      color: var(--ink);
    }

    .form input[type="date"] {
      background: var(--bg) !important;
      color: var(--ink);
    }



    .form input:not([type="checkbox"]),
    .form textarea {
      border-bottom-color: var(--ink) !important;
    }

    .form select,
    .form input[type="date"] {
      border-color: var(--ink) !important;
    }


    /* Readability-first form controls */
    .form label {
      color: var(--sub);
    }

    .form input:not([type="checkbox"]),
    .form textarea,
    .form select {
      width: 100%;
      color: var(--ink) !important;
      -webkit-text-fill-color: var(--ink) !important;
      background: var(--surface-soft) !important;
      border: 1px solid var(--line-strong) !important;
      border-radius: 0;
      box-shadow: none;
      opacity: 1;
    }

    .form input:not([type="checkbox"]),
    .form textarea {
      border-width: 0 0 1px 0 !important;
      background: transparent !important;
      padding-left: 0;
      padding-right: 0;
    }

    .form select,
    .form input[type="date"] {
      border-width: 1px !important;
      background: var(--surface-soft) !important;
      padding-left: 6px;
      padding-right: 6px;
    }

    .form input::placeholder,
    .form textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .form input:focus,
    .form textarea:focus,
    .form select:focus {
      outline: 1px solid var(--ink);
      outline-offset: 2px;
    }

    .form input[type="date"] {
      text-align: left;
    }

    .form input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }

    .form input[type="checkbox"] {
      opacity: 1;
      accent-color: var(--ink);
    }

    @media (max-width: 380px) {
      .entry-workno-technique {
        grid-template-columns: 100px minmax(0, 1fr);
      }

      .entry-dates {
        grid-template-columns: 130px 130px;
        overflow-x: auto;
      }
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      gap: 10px 20px;
    }

    .field {
      display: grid;
      gap: 1px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .three-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 11px;
    }

    .two-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .sub-field {
      display: grid;
      gap: 1px;
    }

    .sub-field label:not(.ask-line) {
      color: var(--muted);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .ask-line {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
      margin-top: 1px;
      color: var(--sub);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .ask-line input {
      width: 12px;
      min-height: 12px;
      padding: 0;
      accent-color: var(--ink);
    }



    .inline-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      margin-top: 2px;
    }

    .inline-add.single-action {
      display: flex;
      justify-content: flex-start;
    }

    .selected-list {
      display: grid;
      gap: 1px;
      margin: 2px 0;
      color: var(--sub);
    }

    .selected-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: baseline;
    }


    .hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .file-label {
      display: inline-block;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 5px;
      margin-top: 3px;
    }

    .data-block {
      display: grid;
      gap: 7px;
      padding: 8px 0;
    }

    .hint {
      margin: 0;
      color: var(--sub);
      font-size: 12px;
      line-height: 2;
    }

    .option-list {
      display: grid;
      gap: 1px;
      margin-top: 2px;
    }

    .option-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 1px 0;
      color: var(--ink);
    }


    .theme-icon {
      font-size: 14px;
      line-height: 1;
    }

    .nested-list {
      display: grid;
      gap: 0;
      margin-top: 4px;
    }

    .nested-work {
      padding-left: 0;
    }

    .nested-work .work-summary {

    const SUPABASE_URL = "https://xovbmsyjhtlxldtjbvvm.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_gP9cTUqzNytHEXRUY9-dug__quOy4fv";
    const WSV_ASSET_BUCKET = "wsv-assets";
    const cloudClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    let works = [];
    let seriesRecords = [];
    let cloudAssets = [];
    let relatedLinks = [];
    let activeListMode = "works";
    let activeTechnique = "ALL";
    let activeProduction = "ALL";
    let activeManagement = "ALL";
    let sortKey = "workNo";
    let sortDirection = "asc";

    const PRODUCTION_STATUSES = ["制作中", "完成", "制作終了", "試作品"];
    const MANAGEMENT_STATUSES = ["保管中", "売却済", "譲渡済", "貸出中", "処分済"];

    const workList = document.getElementById("workList");
    const searchInput = document.getElementById("searchInput");
    const statusEl = document.getElementById("status");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    

    function normalizeUrl(url = "") {
      const raw = String(url || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      return "https://" + raw;
    }

    function normalizeRelatedLinks(links = []) {
      if (!Array.isArray(links)) return [];
      return links
        .map((link, index) => {
          const url = normalizeUrl(link.url || "");
          if (!url) return null;
          return {
            id: link.id || "",
            title: String(link.title || url).trim(),
            url,
            sortOrder: Number.isFinite(Number(link.sort_order ?? link.sortOrder)) ? Number(link.sort_order ?? link.sortOrder) : index,
            isPublic: Boolean(link.is_public ?? link.isPublic)
          };
        })
        .filter(Boolean)
        .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
    }

    function relatedLinksForWork(work = {}) {
      return normalizeRelatedLinks(relatedLinks.filter(link => link.work_id === work.id));
    }

    function relatedLinksForSeries(series = {}) {
      return normalizeRelatedLinks(relatedLinks.filter(link => link.series_id === series.id));
    }

    function relatedLinksSearchText(links = []) {
      return normalizeRelatedLinks(links).map(link => `${link.title} ${link.url}`).join(" ");
    }

    function relatedLinksDetailRowHtml(links = []) {
      const clean = normalizeRelatedLinks(links);
      if (!clean.length) return "";
      const items = clean
        .map(link => `<a class="related-link-item" href="${escapeAttr(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.title)} / ${escapeHtml(link.url)}</a>`)
        .join("");
      return `<div class="detail-row related-url-row"><div class="detail-key">URL</div><div class="detail-value"><div class="related-link-list">${items}</div></div></div>`;
    }

function normalizeWorkNo(value) {
      const digits = String(value ?? "").replace(/\D/g, "").slice(0, 4);
      return digits ? digits.padStart(4, "0") : "";
    }

    function normalizeStatuses(work = {}) {
      return {
        productionStatus: work.production_status || work.productionStatus || "",
        managementStatus: work.management_status || work.managementStatus || ""
      };
    }

    function cloudAssetPublicUrl(path) {
      if (!path) return "";
      const { data } = cloudClient.storage.from(WSV_ASSET_BUCKET).getPublicUrl(path);
      return data && data.publicUrl ? data.publicUrl : "";
    }

    function formatMoney(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (!Number.isFinite(n)) return String(value);
      return "¥" + Math.round(n).toLocaleString("ja-JP");
    }

    function formatDimensions(work = {}) {
      const h = work.size_h ?? work.sizeH ?? "";
      const w = work.size_w ?? work.sizeW ?? "";
      const d = work.size_d ?? work.sizeD ?? "";
      const parts = [];
      if (h !== "" && h !== null) parts.push("H" + h);
      if (w !== "" && w !== null) parts.push("W" + w);
      if (d !== "" && d !== null) parts.push("D" + d);
      return parts.length ? parts.join(" × ") + " mm" : "";
    }

    function workTitle(work = {}) {
      return work.title || work.title_en || "Untitled";
    }

    function workListTitleHtml(work = {}) {
      const title = escapeHtml(workTitle(work));
      const series = seriesRecords.find(item => item.id === work.series_id);
      const code = series && series.code ? String(series.code).trim() : "";
      if (!code) return title;
      return `${title}<span class="title-series-code">（${escapeHtml(code)}）</span>`;
    }

    function workDescription(work = {}) {
      return work.description || "";
    }

    function normalizeProductionDate(work = {}) {
      return work.start_date || "";
    }

    function seriesTitle(series = {}) {
      return series.title || series.title_en || series.code || normalizeWorkNo(series.series_no) || "";
    }

    function seriesLabel(series = {}) {
      if (!series) return "";
      const code = series.code ? series.code + " / " : "";
      return code + seriesTitle(series);
    }


    function seriesLabelHtml(series, hostId = "") {
      const label = seriesLabel(series);
      if (!series || !series.id || !label) return escapeHtml(label || "");
      const safeHostId = hostId || series.id;
      return `<button class="detail-link-button" type="button" onclick="toggleInlineSeries('${escapeAttr(series.id)}', '${escapeAttr(safeHostId)}')">${escapeHtml(label)}</button>`;
    }

    function seriesDetailHtml(series = {}) {
      const no = normalizeWorkNo(series.series_no);
      const relatedWorks = works
        .filter(w => w.series_id === series.id)
        .sort(compareWorks);

      return `
        <div class="inline-expanded">
          <div class="detail-grid">
            ${logoDetailRowHtml("series", series)}
            ${row("№", no)}
            ${row("Code", series.code)}
            ${row("Title", series.title)}
            ${row("T_EN", series.title_en)}
            ${row("Start", series.start_date)}
            ${row("Works", String(relatedWorks.length))}
            ${mentionRow("Description", series.description)}
            ${mentionRow("D_EN", series.description_en)}
            ${additionalLogoDetailRowHtml("series", series)}
            ${relatedLinksDetailRowHtml(relatedLinksForSeries(series))}
          </div>
        </div>`;
    }

    window.toggleInlineSeries = async function(seriesId, hostId = "") {
      const safeHostId = hostId || seriesId;
      const target = document.getElementById(`inline-series-${safeHostId}-${seriesId}`);
      if (!target) return;
      if (target.dataset.open === "1") {
        target.innerHTML = "";
        target.dataset.open = "";
        requestAnimationFrame(() => scrollItemToTop(markerRow));
        return;
      }
      target.dataset.open = "1";
      target.innerHTML = '<div class="detail-loading">Loading detail...</div>';
      try {
        const series = await loadPublicSeriesDetail(seriesId);
        target.innerHTML = seriesDetailHtml(series);
      } catch (error) {
        console.error(error);
        target.innerHTML = '<div class="detail-loading">Detail could not be loaded.</div>';
      }
    };


    function getSeriesRecordForWork(work = {}) {
      return seriesRecords.find(series => series.id === work.series_id) || null;
    }

    function getSeriesRecordByTitle(title) {
      return seriesRecords.find(series => seriesTitle(series) === title || seriesLabel(series) === title) || null;
    }

    function findLogoAssets(kind, record = {}) {
      if (!record || !record.id) return [];
      const assetType = kind === "series" ? "series_logo" : "work_logo";
      const assets = cloudAssets
        .filter(asset => {
          if (asset.asset_type !== assetType) return false;
          return kind === "series" ? asset.series_id === record.id : asset.work_id === record.id;
        })
        .sort((a, b) => {
          const ao = Number.isFinite(Number(a.sort_order)) ? Number(a.sort_order) : 0;
          const bo = Number.isFinite(Number(b.sort_order)) ? Number(b.sort_order) : 0;
          if (ao !== bo) return ao - bo;
          return String(a.created_at || "").localeCompare(String(b.created_at || ""));
        });

      const id = record.logo_asset_id || record.logoAssetId || "";
      if (!id) return assets;
      const index = assets.findIndex(asset => asset.id === id);
      if (index <= 0) return assets;
      const primary = assets[index];
      return [primary, ...assets.slice(0, index), ...assets.slice(index + 1)];
    }

    function findLogoAsset(kind, record = {}) {
      return findLogoAssets(kind, record)[0] || null;
    }

    function findWorkImageAssets(work = {}) {
      if (!work || !work.id) return [];
      return cloudAssets
        .filter(asset => asset.work_id === work.id && asset.asset_type === "work_image")
        .sort((a, b) => {
          if (Boolean(a.is_cover) !== Boolean(b.is_cover)) return a.is_cover ? -1 : 1;
          return Number(a.sort_order || 0) - Number(b.sort_order || 0) || String(a.created_at || "").localeCompare(String(b.created_at || ""));
        });
    }

    function findCoverImageAsset(work = {}) {
      if (!work) return null;
      const coverId = work.cover_asset_id || "";
      if (coverId) {
        const byId = cloudAssets.find(asset => asset.id === coverId && asset.asset_type === "work_image");
        if (byId) return byId;
      }
      return findWorkImageAssets(work).find(asset => asset.is_cover) || findWorkImageAssets(work)[0] || null;
    }

    function coverImageDetailRowHtml(work = {}) {
      const asset = findCoverImageAsset(work);
      if (!asset || !asset.storage_path) return "";
      const url = cloudAssetPublicUrl(asset.storage_path);
      if (!url) return "";
      return `<div class="detail-row cover-detail-row media-compact-row"><div class="detail-value"><img class="cover-detail-image" src="${escapeAttr(url)}" alt="${escapeAttr(asset.alt_text || workTitle(work))}"></div></div>`;
    }

    function logoAssetMarkup(kind, asset, showCaption = true) {
      if (!asset || !asset.storage_path) return "";
      const url = cloudAssetPublicUrl(asset.storage_path);
      if (!url) return "";
      const caption = showCaption ? escapeHtml(asset.caption || "") : "";
      return `<div class="logo-stack-item"><img src="${escapeAttr(url)}" alt="${escapeAttr(kind === "series" ? "Series logo" : "Work logo")}">${caption ? `<div class="logo-caption-display">${caption}</div>` : ""}</div>`;
    }

    function logoDetailRowHtml(kind, record = {}) {
      const assets = findLogoAssets(kind, record).filter(asset => asset && asset.storage_path && cloudAssetPublicUrl(asset.storage_path));
      const primary = assets[0] || null;
      if (!primary) return "";
      return `<div class="detail-row logo-detail-row media-compact-row"><div class="detail-key">LOGO</div><div class="detail-value"><div class="logo-detail-preview"><div class="logo-stack">${logoAssetMarkup(kind, primary, false)}</div></div></div></div>`;
    }

    function additionalLogoDetailRowHtml(kind, record = {}) {
      const assets = findLogoAssets(kind, record)
        .filter(asset => asset && asset.storage_path && cloudAssetPublicUrl(asset.storage_path))
        .slice(1);
      if (!assets.length) return "";
      return `<div class="detail-row logo-detail-row additional-logo-detail-row media-compact-row"><div class="detail-key">LOGO</div><div class="detail-value"><div class="logo-detail-preview"><div class="logo-stack">${assets.map(asset => logoAssetMarkup(kind, asset, true)).join("")}</div></div></div></div>`;
    }

    function workImagesDetailRowHtml(work = {}) {
      const cover = findCoverImageAsset(work);
      const images = findWorkImageAssets(work).filter(asset => !cover || asset.id !== cover.id);
      if (!images.length) return "";
      const items = images.map(asset => {
        const url = cloudAssetPublicUrl(asset.storage_path);
        if (!url) return "";
        const caption = escapeHtml(asset.caption || "");
        return `<div class="work-image-card"><img src="${escapeAttr(url)}" alt="${escapeAttr(asset.alt_text || asset.caption || workTitle(work))}">${caption ? `<div class="work-image-caption">${caption}</div>` : ""}</div>`;
      }).join("");
      return `<div class="detail-row image-detail-row media-compact-row"><div class="detail-value"><div class="work-image-gallery">${items}</div></div></div>`;
    }

    function hasDisplayValue(value) {
      if (value === null || value === undefined) return false;
      if (Array.isArray(value)) return value.length > 0;
      return String(value).trim() !== "";
    }

    function row(key, value) {
      if (!hasDisplayValue(value)) return "";
      return `<div class="detail-row"><div class="detail-key">${escapeHtml(key)}</div><div class="detail-value">${escapeHtml(value)}</div></div>`;
    }


    function mentionTargetByNo(no) {
      const cleanNo = normalizeWorkNo(no);
      if (!cleanNo) return null;
      const work = works.find(item => normalizeWorkNo(item.work_no) === cleanNo);
      if (work) return { type: "work", label: "WORK", title: workTitle(work) || cleanNo, no: cleanNo };
      const series = seriesRecords.find(item => normalizeWorkNo(item.series_no) === cleanNo);
      if (series) return { type: "series", label: "SERIES", title: seriesTitle(series) || cleanNo, no: cleanNo };
      return null;
    }

    function renderMentionText(value) {
      const raw = String(value ?? "");
      if (!hasDisplayValue(raw)) return "";
      const pattern = /@(\d{4})(?!\d)/g;
      let html = "";
      let lastIndex = 0;
      let match;
      while ((match = pattern.exec(raw)) !== null) {
        html += escapeHtml(raw.slice(lastIndex, match.index));
        const target = mentionTargetByNo(match[1]);
        if (target) {
          html += `<a class="mention-link" href="${escapeAttr(detailUrl(target.type, target.no))}" target="_blank" rel="noopener noreferrer"><span class="mention-kind">[${escapeHtml(target.label)}]</span>${escapeHtml(target.title)}</a>`;
        } else {
          html += escapeHtml(match[0]);
        }
        lastIndex = pattern.lastIndex;
      }
      html += escapeHtml(raw.slice(lastIndex));
      return html;
    }

    function richRow(key, html) {
      if (!hasDisplayValue(html)) return "";
      return `<div class="detail-row"><div class="detail-key">${escapeHtml(key)}</div><div class="detail-value">${html}</div></div>`;
    }

    function mentionRow(key, value) {
      return richRow(key, renderMentionText(value));
    }

    function seriesLinkHtml(seriesTitleText) {
      return escapeHtml(seriesTitleText || "");
    }

    function workDetailHtml(work = {}) {
      const statuses = normalizeStatuses(work);
      const workNo = normalizeWorkNo(work.work_no);
      const series = getSeriesRecordForWork(work);
      return `
              <div class="detail-grid">
                ${coverImageDetailRowHtml(work)}
                ${logoDetailRowHtml("work", work)}
                ${row("№", workNo)}
                ${row("Title", work.title)}
                ${row("T_EN", work.title_en)}
                ${hasDisplayValue(seriesLabelHtml(series, work.id)) ? `<div class="detail-row">
                  <div class="detail-key">Series</div>
                  <div class="detail-value">${seriesLabelHtml(series, work.id)}</div>
                </div>` : ""}
                ${series && series.id ? `<div class="inline-series-host" id="inline-series-${escapeAttr(work.id)}-${escapeAttr(series.id)}"></div>` : ""}
                ${row("Start", normalizeProductionDate(work))}
                ${row("Completed", work.completed_date)}
                ${row("Production", statuses.productionStatus)}
                ${row("Management", statuses.managementStatus)}
                ${row("Location", work.location)}
                ${row("Owner", work.holder_name)}
                ${row("Technique", work.technique)}
                ${row("Materials", work.materials)}
                ${row("Size", formatDimensions(work))}
                ${mentionRow("Description", workDescription(work))}
                ${mentionRow("D_EN", work.description_en)}
                ${additionalLogoDetailRowHtml("work", work)}
                ${relatedLinksDetailRowHtml(relatedLinksForWork(work))}
                ${workImagesDetailRowHtml(work)}
              </div>`;
    }

    function compareWorks(a, b) {
      let av = "";
      let bv = "";
      if (sortKey === "workNo") {
        av = normalizeWorkNo(a.work_no);
        bv = normalizeWorkNo(b.work_no);
      } else if (sortKey === "title") {
        av = workTitle(a);
        bv = workTitle(b);
      } else if (sortKey === "year") {
        av = String(a.completed_date || a.start_date || "");
        bv = String(b.completed_date || b.start_date || "");
      }
      const result = av.localeCompare(bv, "ja", { numeric: true });
      return sortDirection === "asc" ? result : -result;
    }

    function compareSeries(a, b) {
      let av = "";
      let bv = "";
      if (sortKey === "workNo") {
        av = normalizeWorkNo(a.series_no);
        bv = normalizeWorkNo(b.series_no);
      } else if (sortKey === "title") {
        av = seriesTitle(a);
        bv = seriesTitle(b);
      } else if (sortKey === "year") {
        av = String(a.start_date || "");
        bv = String(b.start_date || "");
      }
      const result = av.localeCompare(bv, "ja", { numeric: true });
      return sortDirection === "asc" ? result : -result;
    }

    function renderLinkButtons(id, options, active, handler) {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      wrap.innerHTML = [
        `<button class="text-button ${active === "ALL" ? "selected" : ""}" type="button" data-value="ALL">ALL</button>`,
        ...options.map(option => `<button class="text-button ${active === option ? "selected" : ""}" type="button" data-value="${escapeAttr(option)}">${escapeHtml(option)}</button>`)
      ].join("");
      wrap.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => handler(button.dataset.value || "ALL"));
      });
    }


    function techniqueSortByCount(a, b) {
      const labelA = String(a || "").trim();
      const labelB = String(b || "").trim();
      const countA = works.filter(work => String(work.technique || "").trim() === labelA).length;
      const countB = works.filter(work => String(work.technique || "").trim() === labelB).length;
      if (countB !== countA) return countB - countA;
      return labelA.localeCompare(labelB, "ja", { numeric: true });
    }

    function renderFilters() {
      const techniques = Array.from(new Set(works.map(w => String(w.technique || "").trim()).filter(Boolean))).sort(techniqueSortByCount);
      renderLinkButtons("techniqueLinks", techniques, activeTechnique, value => {
        activeTechnique = value;
        render();
      });
      renderLinkButtons("productionLinks", PRODUCTION_STATUSES, activeProduction, value => {
        activeProduction = value;
        render();
      });
      renderLinkButtons("managementLinks", MANAGEMENT_STATUSES, activeManagement, value => {
        activeManagement = value;
        render();
      });
    }

    function renderSortMarks() {
      const map = {
        workNo: document.getElementById("sortMarkWorkNo"),
        title: document.getElementById("sortMarkTitle"),
        year: document.getElementById("sortMarkYear")
      };
      Object.entries(map).forEach(([key, el]) => {
        if (!el) return;
        el.className = "sort-mark " + (sortDirection === "desc" ? "desc" : "");
        el.textContent = sortKey === key ? (sortDirection === "desc" ? "↗" : "↘") : "";
      });
    }

    function filteredWorks() {
      const query = searchInput.value.trim().toLowerCase();
      return works
        .filter(w => activeTechnique === "ALL" || String(w.technique || "") === activeTechnique)
        .filter(w => {
          const statuses = normalizeStatuses(w);
          return activeProduction === "ALL" || statuses.productionStatus === activeProduction;
        })
        .filter(w => {
          const statuses = normalizeStatuses(w);
          return activeManagement === "ALL" || statuses.managementStatus === activeManagement;
        })
        .filter(w => {
          if (!query) return true;
          const statuses = normalizeStatuses(w);
          const series = getSeriesRecordForWork(w);
          return [
            normalizeWorkNo(w.work_no),
            w.title,
            w.title_en,
            w.completed_date,
            w.start_date,
            seriesLabel(series),
            statuses.productionStatus,
            statuses.managementStatus,
            w.technique
          ].some(value => String(value || "").toLowerCase().includes(query));
        })
        .sort(compareWorks);
    }

    function siteBaseUrl() {
      const path = location.pathname || "/";
      const lower = path.toLowerCase();
      let basePath = path;
      ["/work/", "/series/", "/updates/", "/profile/", "/admin/", "/portfolio/"].forEach(segment => {
        const index = lower.indexOf(segment);
        if (index >= 0) basePath = path.slice(0, index + 1);
      });
      return location.origin + basePath;
    }

    function detailUrl(type, no) {
      const cleanNo = normalizeWorkNo(no);
      const folder = type === "series" ? "series" : "work";
      return `${siteBaseUrl()}${folder}/?no=${encodeURIComponent(cleanNo)}`;
    }

    async function shareDetail(type, no, title) {
      const url = detailUrl(type, no);
      const shareTitle = title ? `VAMRSS / ${title}` : "VAMRSS";
      try {
        if (navigator.share) {
          await navigator.share({ title: shareTitle, text: shareTitle, url });
          return;
        }
      } catch (error) {
        if (error && error.name === "AbortError") return;
      }
      try {
        await navigator.clipboard.writeText(url);
        const status = document.getElementById("status");
        if (status) { status.style.display = "block"; status.textContent = "Share URL copied."; }
      } catch (error) {
        window.prompt("Copy share URL", url);
      }
    }

    function openDetailPage(type, no) {
      const url = detailUrl(type, no);
      const opened = window.open(url, "_blank");
      if (opened) {
        opened.opener = null;
        return;
      }
      const status = document.getElementById("status");
      if (status) { status.style.display = "block"; status.textContent = "Open page was blocked. Please allow pop-ups for this site."; }
    }

    function markCurrentItem(element) {
      document.querySelectorAll(".work.is-current, .series-work-row.is-current").forEach(item => {
        item.classList.remove("is-current");
      });
      if (element) element.classList.add("is-current");
    }

    function scrollItemToTop(element) {
      if (!element) return;
      const offset = 16;
      const top = element.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    function replaceById(list, item) {
      const index = list.findIndex(existing => existing.id === item.id);
      if (index >= 0) list[index] = { ...list[index], ...item };
      else list.push(item);
    }

    function replaceAssetsFor(type, id, assets) {
      cloudAssets = cloudAssets.filter(asset => {
        if (type === "work") return asset.work_id !== id;
        return asset.series_id !== id;
      });
      cloudAssets.push(...(assets || []));
    }

    function replaceLinksFor(type, id, links) {
      relatedLinks = relatedLinks.filter(link => {
        if (type === "work") return link.work_id !== id;
        return link.series_id !== id;
      });
      relatedLinks.push(...(links || []));
    }

    async function loadPublicWorkDetail(id) {
      const current = works.find(work => work.id === id);
      if (current && current._detailLoaded) return current;

      const [workResult, assetResult] = await Promise.all([
        cloudClient
          .from("wsv_works")
          .select("id,work_no,title,title_en,series_id,start_date,completed_date,production_status,management_status,technique,materials,size_h,size_w,size_d,location,holder_name,description,description_en,logo_asset_id,cover_asset_id,is_public,sort_order,created_at,updated_at,content_updated_at")
          .eq("id", id)
          .eq("is_public", true)
          .maybeSingle(),
        cloudClient
          .from("wsv_assets")
          .select("id,work_id,series_id,asset_type,storage_bucket,storage_path,file_name,mime_type,alt_text,caption,sort_order,is_cover,is_public,created_at,updated_at")
          .eq("work_id", id)
          .eq("is_public", true)
          .in("asset_type", ["work_logo", "work_image"])
          .order("sort_order", { ascending: true })
      ]);

      if (workResult.error) throw workResult.error;
      if (assetResult.error) throw assetResult.error;
      if (!workResult.data) throw new Error("WORK_NOT_FOUND");

      let links = [];
      try {
        const linkResult = await cloudClient
          .from("wsv_related_links")
          .select("id,target_type,work_id,series_id,title,url,sort_order,is_public,created_at,updated_at")
          .eq("target_type", "work")
          .eq("work_id", id)
          .eq("is_public", true)
          .order("sort_order", { ascending: true });
        if (linkResult.error) throw linkResult.error;
        links = linkResult.data || [];
      } catch (error) {
        console.warn("WSV work URL links could not be loaded.", error);
        links = [];
      }

      const fullWork = { ...(current || {}), ...workResult.data, _detailLoaded: true };
      replaceById(works, fullWork);
      replaceAssetsFor("work", id, assetResult.data || []);
      replaceLinksFor("work", id, links);
      return fullWork;
    }

    async function loadPublicSeriesDetail(id) {
      const current = seriesRecords.find(series => series.id === id);
      if (current && current._detailLoaded) return current;

      const [seriesResult, assetResult] = await Promise.all([
        cloudClient
          .from("wsv_series")
          .select("id,series_no,code,title,title_en,start_date,description,description_en,logo_asset_id,is_public,sort_order,created_at,updated_at,content_updated_at")
          .eq("id", id)
          .eq("is_public", true)
          .maybeSingle(),
        cloudClient
          .from("wsv_assets")
          .select("id,work_id,series_id,asset_type,storage_bucket,storage_path,file_name,mime_type,alt_text,caption,sort_order,is_cover,is_public,created_at,updated_at")
          .eq("series_id", id)
          .eq("is_public", true)
          .eq("asset_type", "series_logo")
          .order("sort_order", { ascending: true })
      ]);

      if (seriesResult.error) throw seriesResult.error;
      if (assetResult.error) throw assetResult.error;
      if (!seriesResult.data) throw new Error("SERIES_NOT_FOUND");

      let links = [];
      try {
        const linkResult = await cloudClient
          .from("wsv_related_links")
          .select("id,target_type,work_id,series_id,title,url,sort_order,is_public,created_at,updated_at")
          .eq("target_type", "series")
          .eq("series_id", id)
          .eq("is_public", true)
          .order("sort_order", { ascending: true });
        if (linkResult.error) throw linkResult.error;
        links = linkResult.data || [];
      } catch (error) {
        console.warn("WSV series URL links could not be loaded.", error);
        links = [];
      }

      const fullSeries = { ...(current || {}), ...seriesResult.data, _detailLoaded: true };
      replaceById(seriesRecords, fullSeries);
      replaceAssetsFor("series", id, assetResult.data || []);
      replaceLinksFor("series", id, links);
      return fullSeries;
    }

    function workDetailContentHtml(work) {
      const no = normalizeWorkNo(work.work_no);
      return `${workDetailHtml(work)}
              <div class="share-action-row">
                <button class="text-button" type="button" onclick="openDetailPage('work', '${escapeAttr(no)}')">DOSV2で出力（SHARE）</button>
                <button class="text-button detail-close-button" type="button" onclick="toggleWork('${escapeAttr(work.id)}')">CLOSE</button>
              </div>`;
    }

    function seriesDetailContentHtml(series) {
      const no = normalizeWorkNo(series.series_no);
      const relatedWorks = works
        .filter(work => work.series_id === series.id)
        .sort(compareWorks);
      return `
              <div class="detail-grid">
                ${logoDetailRowHtml("series", series)}
                ${row("№", no)}
                ${row("Code", series.code)}
                ${row("Title", series.title)}
                ${row("T_EN", series.title_en)}
                ${row("Start", series.start_date)}
                ${row("Works", String(relatedWorks.length))}
                ${mentionRow("Description", series.description)}
                ${mentionRow("D_EN", series.description_en)}
                ${additionalLogoDetailRowHtml("series", series)}
                ${relatedLinksDetailRowHtml(relatedLinksForSeries(series))}
              </div>
              <div class="share-action-row">
                <button class="text-button" type="button" onclick="openDetailPage('series', '${escapeAttr(no)}')">DOSV2で出力（SHARE）</button>
                <button class="text-button detail-close-button" type="button" onclick="toggleSeries('${escapeAttr(series.id)}')">CLOSE</button>
              </div>
              ${relatedWorks.length ? `
                <div class="detail-grid">
                  ${relatedWorks.map(work => `
                    <div class="detail-row series-work-row">
                      <div class="detail-key">${escapeHtml(normalizeWorkNo(work.work_no))}</div>
                      <div class="detail-value"><button class="inline-series-link" type="button" onclick="toggleNestedWork('series-${escapeAttr(series.id)}', '${escapeAttr(work.id)}')">${escapeHtml(workTitle(work))}</button></div>
                    </div>
                    <div id="series-${escapeAttr(series.id)}-work-${escapeAttr(work.id)}"></div>
                  `).join("")}
                </div>
              ` : ""}`;
    }

    function renderWorksList() {
      renderFilters();
      renderSortMarks();
      const filtered = filteredWorks();
      if (!filtered.length) {
        workList.innerHTML = '<div class="empty">公開作品がありません。</div>';
        return;
      }

      workList.innerHTML = filtered.map(w => {
        const workNo = normalizeWorkNo(w.work_no);
        return `
          <article class="work" id="work-${escapeAttr(w.id)}">
            <button class="work-summary" type="button" onclick="toggleWork('${escapeAttr(w.id)}')">
              <div class="work-no">${escapeHtml(workNo)}</div>
              <div class="work-title"><span class="title-scroll">${workListTitleHtml(w)}</span></div>
              <div class="work-year">${escapeHtml(w.completed_date || "")}</div>
            </button>
            <div class="work-detail" id="work-detail-${escapeAttr(w.id)}" data-loaded="">
              <div class="detail-loading">Detail will load when opened.</div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderSeriesList() {
      renderFilters();
      renderSortMarks();
      const query = searchInput.value.trim().toLowerCase();
      const filtered = seriesRecords
        .filter(s => {
          if (!query) return true;
          return [
            normalizeWorkNo(s.series_no),
            s.code,
            s.title,
            s.title_en,
            s.start_date
          ].some(value => String(value || "").toLowerCase().includes(query));
        })
        .sort(compareSeries);

      if (!filtered.length) {
        workList.innerHTML = '<div class="empty">公開シリーズがありません。</div>';
        return;
      }

      workList.innerHTML = filtered.map(s => {
        const no = normalizeWorkNo(s.series_no);
        const relatedWorks = works
          .filter(w => w.series_id === s.id)
          .sort(compareWorks);

        return `
          <article class="work" id="series-${escapeAttr(s.id)}">
            <button class="work-summary" type="button" onclick="toggleSeries('${escapeAttr(s.id)}')">
              <div class="work-no">${escapeHtml(no)}</div>
              <div class="work-title"><span class="title-scroll">${escapeHtml(s.code ? s.code + " / " : "")}${escapeHtml(seriesTitle(s))}</span></div>
              <div class="work-year">${escapeHtml(s.start_date || "")}</div>
            </button>
            <div class="work-detail" id="series-detail-${escapeAttr(s.id)}" data-loaded="">
              <div class="detail-loading">Detail will load when opened.</div>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      const isSeries = activeListMode === "series";
      document.getElementById("worksModeButton").classList.toggle("selected", !isSeries);
      document.getElementById("seriesModeButton").classList.toggle("selected", isSeries);
      const navWorksButton = document.getElementById("navWorksButton");
      const navSeriesButton = document.getElementById("navSeriesButton");
      if (navWorksButton) navWorksButton.classList.toggle("selected", !isSeries);
      if (navSeriesButton) navSeriesButton.classList.toggle("selected", isSeries);
      document.getElementById("worksFilterArea").style.display = isSeries ? "none" : "grid";
      const headerButtons = document.querySelectorAll(".list-head .text-button");
      if (headerButtons[2]) headerButtons[2].firstChild.nodeValue = isSeries ? "START" : "DONE";
      const productionLinks = document.getElementById("productionLinks");
      const managementLinks = document.getElementById("managementLinks");
      if (productionLinks) productionLinks.style.display = isSeries ? "none" : "flex";
      if (managementLinks) managementLinks.style.display = isSeries ? "none" : "flex";
      if (isSeries) renderSeriesList();
      else renderWorksList();
    }

    function safeRender() {
      try {
        render();
      } catch (renderError) {
        console.warn("WSV portfolio render retry without URL links.", renderError);
        relatedLinks = [];
        render();
      }
    }

    window.toggleWork = async function(id) {
      const article = document.getElementById("work-" + id);
      const detail = document.getElementById("work-detail-" + id);
      if (!article || !detail) return;
      markCurrentItem(article);
      if (article.classList.contains("open")) {
        article.classList.remove("open");
        requestAnimationFrame(() => scrollItemToTop(article));
        return;
      }
      article.classList.add("open");
      if (detail.dataset.loaded === "1") return;
      detail.innerHTML = '<div class="detail-loading">Loading detail...</div>';
      try {
        const work = await loadPublicWorkDetail(id);
        detail.dataset.loaded = "1";
        detail.innerHTML = workDetailContentHtml(work);
      } catch (error) {
        console.error(error);
        detail.innerHTML = '<div class="detail-loading">Detail could not be loaded.</div>';
      }
    };

    window.toggleSeries = async function(id) {
      const article = document.getElementById("series-" + id);
      const detail = document.getElementById("series-detail-" + id);
      if (!article || !detail) return;
      markCurrentItem(article);
      if (article.classList.contains("open")) {
        article.classList.remove("open");
        requestAnimationFrame(() => scrollItemToTop(article));
        return;
      }
      article.classList.add("open");
      if (detail.dataset.loaded === "1") return;
      detail.innerHTML = '<div class="detail-loading">Loading detail...</div>';
      try {
        const series = await loadPublicSeriesDetail(id);
        detail.dataset.loaded = "1";
        detail.innerHTML = seriesDetailContentHtml(series);
      } catch (error) {
        console.error(error);
        detail.innerHTML = '<div class="detail-loading">Detail could not be loaded.</div>';
      }
    };

    window.toggleNestedWork = async function(hostId, workId) {
      const target = document.getElementById(`${hostId}-work-${workId}`);
      if (!target) return;
      const markerRow = target.previousElementSibling || target;
      markCurrentItem(markerRow);

      if (target.dataset.open === "1") {
        target.innerHTML = "";
        target.dataset.open = "";
        return;
      }

      target.dataset.open = "1";
      target.innerHTML = '<div class="inline-expanded detail-loading" style="margin-top:1em; margin-bottom:1em;">Loading detail...</div>';
      try {
        const work = await loadPublicWorkDetail(workId);
        target.innerHTML = `
          <div class="inline-expanded" style="margin-top:1em; margin-bottom:1em;">
            ${workDetailHtml(work)}
            <div class="share-action-row">
              <button class="text-button" type="button" onclick="openDetailPage('work', '${escapeAttr(normalizeWorkNo(work.work_no))}')">DOSV2で出力（SHARE）</button>
              <button class="text-button detail-close-button" type="button" onclick="toggleNestedWork('${escapeAttr(hostId)}', '${escapeAttr(work.id)}')">CLOSE</button>
            </div>
          </div>
        `;
      } catch (error) {
        console.error(error);
        target.innerHTML = '<div class="inline-expanded detail-loading" style="margin-top:1em; margin-bottom:1em;">Detail could not be loaded.</div>';
      }
    };

    window.setListMode = function(mode) {
      activeListMode = mode === "series" ? "series" : "works";
      render();
    };

    window.setSort = function(key) {
      if (sortKey === key) sortDirection = sortDirection === "asc" ? "desc" : "asc";
      else {
        sortKey = key;
        sortDirection = "asc";
      }
      render();
    };

    window.toggleStatusPanel = function() {
      const panel = document.getElementById("statusPanel");
      const text = document.getElementById("statusPanelText");
      const searchLine = document.getElementById("portfolioSearchLine");
      const open = panel.classList.toggle("open");
      if (searchLine) searchLine.classList.toggle("search-open", open);
      text.textContent = open ? "−" : "＋";
      if (open) {
        const input = document.getElementById("searchInput");
        if (input) setTimeout(() => input.focus(), 0);
      }
    };

    window.clearFilters = function() {
      activeTechnique = "ALL";
      activeProduction = "ALL";
      activeManagement = "ALL";
      searchInput.value = "";
      render();
    };

    window.toggleTheme = function() {
      const root = document.documentElement;
      const next = root.dataset.theme === "dark" ? "light" : "dark";
      root.dataset.theme = next;
      localStorage.setItem("wsvPortfolioTheme", next);
    };

    searchInput.addEventListener("input", render);

    async function loadPortfolio() {
      try {
        statusEl.textContent = "公開一覧を読み込み中です。";

        const [seriesResult, worksResult] = await Promise.all([
          cloudClient
            .from("wsv_series")
            .select("id,series_no,code,title,title_en,start_date,is_public,sort_order,created_at,updated_at,content_updated_at")
            .eq("is_public", true)
            .order("series_no", { ascending: true }),
          cloudClient
            .from("wsv_works")
            .select("id,work_no,title,title_en,series_id,start_date,completed_date,production_status,management_status,technique,is_public,sort_order,created_at,updated_at,content_updated_at")
            .eq("is_public", true)
            .order("work_no", { ascending: true })
        ]);

        if (seriesResult.error) throw seriesResult.error;
        if (worksResult.error) throw worksResult.error;

        seriesRecords = seriesResult.data || [];
        works = worksResult.data || [];
        cloudAssets = [];
        relatedLinks = [];

        statusEl.style.display = "none";
        safeRender();
      } catch (error) {
        console.error(error);
        statusEl.textContent = "公開一覧を読み込めませんでした。公開設定またはRLSをご確認ください。";
      }
    }

    const savedTheme = localStorage.getItem("wsvPortfolioTheme");
    if (savedTheme === "dark" || savedTheme === "light") {
      document.documentElement.dataset.theme = savedTheme;
    }

    loadPortfolio();
  </script>
</body>
</html>
