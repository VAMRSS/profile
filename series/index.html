    function code128ValueForChar(char) {
      const code = char.charCodeAt(0);
      if (code < 32 || code > 126) return null;
      return code - 32;
    }

    function createCode128Svg(text) {
      const safeText = String(text || "");
      const codes = [104];
      for (const char of safeText) {
        const value = code128ValueForChar(char);
        if (value !== null) codes.push(value);
      }
      let checksum = codes[0];
      for (let i = 1; i < codes.length; i++) checksum += codes[i] * i;
      codes.push(checksum % 103);
      codes.push(106);

      const modules = [];
      codes.forEach(code => {
        const pattern = CODE128_PATTERNS[code];
        for (const bit of pattern) modules.push(bit === "1" ? 1 : 0);
      });

      const barHeight = 108;
      const quiet = 0;
      let x = quiet;
      let rects = "";
      let i = 0;
      while (i < modules.length) {
        const bit = modules[i];
        let width = 1;
        while (i + width < modules.length && modules[i + width] === bit) width++;
        if (bit === 1) rects += `<rect x="${x}" y="0" width="${width}" height="${barHeight}"></rect>`;
        x += width;
        i += width;
      }
      const totalWidth = x + quiet;
      return `<svg class="dos-barcode-svg" viewBox="0 0 ${totalWidth} ${barHeight}" preserveAspectRatio="none" role="img" aria-label="${escapeAttr(safeText)} barcode" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
    }

    function setDosBarcode(kind, no) {
      const idText = `${kind} ID:${normalizeNo(no)}`;
      ["dosBarcode", "dosBarcodeBottom"].forEach(targetId => {
        const target = document.getElementById(targetId);
        if (!target) return;
        target.innerHTML = `${createCode128Svg(idText)}<div class="dos-barcode-text">${escapeHtml(idText)}</div>`;
      });
    }

    function setDosHeader(kind, no, updatedAt = "") {
      const update = document.getElementById("dosUpdateDate");
      setDosBarcode(kind, no);
      if (update) update.textContent = `UPDATE:${slashDateFrom(updatedAt)}`;
    }


    let currentDetailKind = "";
    let currentDetailNo = "";
    let currentDetailTitle = "";

    function setCurrentDetail(kind, no, title) {
      currentDetailKind = kind;
      currentDetailNo = normalizeNo(no);
      currentDetailTitle = title || "";
    }

    window.closeDocumentPage = function() {
      try { window.close(); } catch (error) {}
      if (!window.closed) {
        if (history.length > 1) history.back();
        else location.href = "../";
      }
    };

    window.shareFixedDocument = function() {
      if (!currentDetailKind || !currentDetailNo) return;
      shareCurrent(currentDetailKind, currentDetailNo, currentDetailTitle || document.title || "VAMRSS");
    };

    async function loadSeriesPage() {
      const no=getQueryNo();
      if (no) { setDosHeader("SERIES", no); setCurrentDetail("series", no, ""); }
      if(!no) { document.getElementById("detailHost").innerHTML="シリーズ番号が指定されていません。"; return; }
      try {
        const rows=await supabaseGet("wsv_series",{select:"*",series_no:`eq.${no}`,limit:"1"});
        const series=rows[0];
        if(!series) { document.getElementById("detailHost").innerHTML=`シリーズ №${escapeHtml(no)} は見つかりませんでした。`; return; }
        setDosHeader("SERIES", series.series_no, series.content_updated_at || series.updated_at || series.created_at);
        const [works,assets,links]=await Promise.all([
          supabaseGet("wsv_works",{select:"id,work_no,title,title_en,series_id,completed_date,start_date",series_id:`eq.${series.id}`,order:"work_no.asc"}),
          supabaseGet("wsv_assets",{select:"*",series_id:`eq.${series.id}`,is_public:"eq.true",order:"sort_order.asc,created_at.asc"}),
          supabaseGet("wsv_related_links",{select:"*",target_type:"eq.series",series_id:`eq.${series.id}`,is_public:"eq.true",order:"sort_order.asc,created_at.asc"})
        ]);
        await loadMentionTargetsForTexts(series.description, series.description_en);
        const title=seriesTitle(series); document.title=`VAMRSS / ${title}`; setCurrentDetail("series", series.series_no, title);
        document.getElementById("detailHost").classList.remove("empty");
        document.getElementById("detailHost").innerHTML=`<div class="detail-grid">${row("Title",title,"series-title-row")}${row("T_EN",series.title_en,"series-title-en-row")}${topLogoRowHtml(assets)}${authorRowHtml()}${row("Type","[SERIES]")}${row("№",normalizeNo(series.series_no))}${row("Code",series.code)}${row("Start",series.start_date)}${row("Count",String(works.length))}${mentionRow("Description",series.description,"description-row")}${mentionRow("D_EN",series.description_en,"description-en-row")}${linksHtml(links)}${worksRowHtml(works)}${bottomLogosRowHtml(assets)}</div>`;
      } catch(e) { console.error(e); document.getElementById("detailHost").innerHTML="読み込みに失敗しました。"; }
    }
    loadSeriesPage();
